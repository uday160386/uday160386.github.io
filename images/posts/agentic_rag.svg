<svg viewBox="0 0 960 1200" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#07040f"/><stop offset="100%" style="stop-color:#100818"/>
  </linearGradient>
  <linearGradient id="gPink"   x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#9d174d"/><stop offset="100%" style="stop-color:#f472b6"/></linearGradient>
  <linearGradient id="gGreen"  x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#065f46"/><stop offset="100%" style="stop-color:#34d399"/></linearGradient>
  <linearGradient id="gCyan"   x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#164e63"/><stop offset="100%" style="stop-color:#22d3ee"/></linearGradient>
  <linearGradient id="gAmber"  x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#78350f"/><stop offset="100%" style="stop-color:#fbbf24"/></linearGradient>
  <linearGradient id="gRed"    x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#7f1d1d"/><stop offset="100%" style="stop-color:#f87171"/></linearGradient>
  <linearGradient id="hdr"     x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#4a044e"/><stop offset="100%" style="stop-color:#701a75"/></linearGradient>
  <marker id="aPk" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f472b6"/></marker>
  <marker id="aG"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#34d399"/></marker>
  <marker id="aC"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/></marker>
  <marker id="aA"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#fbbf24"/></marker>
  <marker id="aR"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f87171"/></marker>
  <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<rect width="960" height="1200" fill="url(#bg)"/>
<pattern id="d" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="0.7" fill="#17042a" opacity="0.9"/></pattern>
<rect width="960" height="1200" fill="url(#d)"/>
<ellipse cx="480" cy="600" rx="420" ry="380" fill="#9d174d" opacity="0.025"/>

<!-- Header -->
<rect x="0" y="0" width="960" height="76" fill="url(#hdr)" opacity="0.3"/>
<rect x="0" y="74" width="960" height="2" fill="url(#gPink)"/>
<text x="480" y="32" text-anchor="middle" fill="#fdf4ff" font-size="24" font-weight="800" letter-spacing="3" filter="url(#glow)">AGENTIC RAG PIPELINE</text>
<text x="480" y="57" text-anchor="middle" fill="#ec4899" font-size="10" letter-spacing="4">GUARDRAILS  ·  TOOL USE  ·  REACT LOOP  ·  SELF-REFLECTION  ·  ITERATIVE RETRIEVAL</text>

<!-- ═══════════════════ STEP 1: INPUT GUARDRAILS ═══════════════════════════════ -->
<circle cx="46" cy="106" r="16" fill="#9d174d" stroke="#f472b6" stroke-width="1.5"/>
<text x="46" y="111" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">1</text>
<text x="72" y="112" fill="#f472b6" font-size="12" font-weight="700" letter-spacing="1">INPUT GUARDRAILS  (same 6 guards as Standard RAG)</text>

<rect x="36" y="122" width="888" height="76" rx="7" fill="#0d0415" stroke="#f87171" stroke-width="1.5"/>
<rect x="36" y="122" width="888" height="22" rx="7" fill="#1a0408"/>
<text x="480" y="138" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">🛡 INPUT GUARDRAILS  —  identical to Standard RAG  (QueryLength · Injection · Toxicity · PII · Topic · RateLimit)</text>
<text x="260" y="164" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">BLOCK → return error, never enter agent loop</text>
<text x="620" y="164" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">REDACT → sanitise query before agent sees it</text>
<text x="480" y="185" text-anchor="middle" fill="#475569" font-size="8">Guardrails run BEFORE the agent loop — the agent never sees blocked or unsanitised input</text>

<line x1="480" y1="198" x2="480" y2="222" stroke="#f472b6" stroke-width="2" marker-end="url(#aPk)"/>

<!-- ═══════════════════ STEP 2: AGENT BRAIN ════════════════════════════════════ -->
<circle cx="46" cy="240" r="16" fill="#9d174d" stroke="#f472b6" stroke-width="1.5"/>
<text x="46" y="245" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">2</text>
<text x="72" y="246" fill="#f472b6" font-size="12" font-weight="700" letter-spacing="1">AGENT  (LLM as Orchestrator  ·  agentic_rag.py)</text>

<rect x="36" y="258" width="888" height="72" rx="7" fill="#0d0415" stroke="#ec4899" stroke-width="2"/>
<rect x="36" y="258" width="888" height="24" rx="7" fill="#220930"/>
<text x="480" y="275" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="700">🧠 Agent Brain  (Ollama / Gemini)</text>
<text x="240" y="298" text-anchor="middle" fill="#94a3b8" font-size="9">Receives: query + history + prior observations</text>
<text x="560" y="298" text-anchor="middle" fill="#94a3b8" font-size="9">Plans: which tool? what args? is answer ready?</text>
<text x="240" y="314" text-anchor="middle" fill="#64748b" font-size="8">Outputs JSON: { "thought": "...", "tool": "...", "args": {...} }</text>
<text x="560" y="314" text-anchor="middle" fill="#64748b" font-size="8">Reflects after each observation: enough context?</text>
<!-- max iterations badge -->
<rect x="880" y="264" width="38" height="40" rx="5" fill="#220930" stroke="#ec4899" stroke-width="1.5"/>
<text x="899" y="282" text-anchor="middle" fill="#f472b6" font-size="8" font-weight="700">MAX</text>
<text x="899" y="297" text-anchor="middle" fill="#f472b6" font-size="16" font-weight="800">5</text>

<line x1="480" y1="330" x2="480" y2="356" stroke="#f472b6" stroke-width="2" marker-end="url(#aPk)"/>

<!-- ═══════════════════ STEP 3: TOOL BELT ══════════════════════════════════════ -->
<circle cx="46" cy="374" r="16" fill="#9d174d" stroke="#f472b6" stroke-width="1.5"/>
<text x="46" y="379" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">3</text>
<text x="72" y="380" fill="#f472b6" font-size="12" font-weight="700" letter-spacing="1">TOOL BELT  (ToolExecutor dispatches to ChromaDB)</text>

<!-- 5 tools -->
<rect x="36"  y="394" width="162" height="80" rx="6" fill="#080e1a" stroke="#0891b2" stroke-width="1.5"/>
<text x="117" y="413" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">🔍 search_chunks</text>
<line x1="46" y1="419" x2="188" y2="419" stroke="#1e293b" stroke-width="1"/>
<text x="117" y="433" text-anchor="middle" fill="#475569" font-size="8">Fine-grained retrieval</text>
<text x="117" y="446" text-anchor="middle" fill="#475569" font-size="8">query, top_k</text>
<text x="117" y="460" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="600">facts · defs · code</text>

<rect x="210" y="394" width="162" height="80" rx="6" fill="#080e1a" stroke="#0891b2" stroke-width="1.5"/>
<text x="291" y="413" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">📄 search_pages</text>
<line x1="220" y1="419" x2="362" y2="419" stroke="#1e293b" stroke-width="1"/>
<text x="291" y="433" text-anchor="middle" fill="#475569" font-size="8">Broad page retrieval</text>
<text x="291" y="446" text-anchor="middle" fill="#475569" font-size="8">query, top_k</text>
<text x="291" y="460" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="600">overviews · wide topics</text>

<rect x="384" y="394" width="162" height="80" rx="6" fill="#080e1a" stroke="#0891b2" stroke-width="1.5"/>
<text x="465" y="413" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">📁 filter_by_file</text>
<line x1="394" y1="419" x2="536" y2="419" stroke="#1e293b" stroke-width="1"/>
<text x="465" y="433" text-anchor="middle" fill="#475569" font-size="8">Single doc search</text>
<text x="465" y="446" text-anchor="middle" fill="#475569" font-size="8">filename, query, top_k</text>
<text x="465" y="460" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="600">known source</text>

<rect x="558" y="394" width="162" height="80" rx="6" fill="#080e1a" stroke="#0891b2" stroke-width="1.5"/>
<text x="639" y="413" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="700">📋 summarise_doc</text>
<line x1="568" y1="419" x2="710" y2="419" stroke="#1e293b" stroke-width="1"/>
<text x="639" y="433" text-anchor="middle" fill="#475569" font-size="8">Full doc overview</text>
<text x="639" y="446" text-anchor="middle" fill="#475569" font-size="8">filename</text>
<text x="639" y="460" text-anchor="middle" fill="#22d3ee" font-size="8" font-weight="600">doc-level summary</text>

<rect x="732" y="394" width="192" height="80" rx="6" fill="#0d0415" stroke="#ec4899" stroke-width="2"/>
<rect x="732" y="394" width="192" height="22" rx="6" fill="#220930"/>
<text x="828" y="410" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="700">✅ answer</text>
<line x1="742" y1="416" x2="914" y2="416" stroke="#2d1040" stroke-width="1"/>
<text x="828" y="430" text-anchor="middle" fill="#475569" font-size="8">Ends the loop</text>
<text x="828" y="443" text-anchor="middle" fill="#475569" font-size="8">answer, confident</text>
<text x="828" y="458" text-anchor="middle" fill="#f472b6" font-size="8" font-weight="600">call when ready</text>

<!-- Arrows tools → ChromaDB -->
<line x1="117" y1="474" x2="117" y2="506" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aC)"/>
<line x1="291" y1="474" x2="291" y2="506" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aC)"/>
<line x1="465" y1="474" x2="465" y2="506" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aC)"/>
<line x1="639" y1="474" x2="639" y2="506" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#aC)"/>

<!-- ═══════════════════ STEP 4: CHROMADB ══════════════════════════════════════ -->
<rect x="36" y="508" width="688" height="58" rx="7" fill="#080e1a" stroke="#065f46" stroke-width="1.5"/>
<rect x="36" y="508" width="5" height="58" rx="3" fill="url(#gGreen)"/>
<text x="380" y="529" text-anchor="middle" fill="#34d399" font-size="11" font-weight="700">🗄 ToolExecutor  →  ChromaDB  (HNSW + LSH)</text>
<text x="210" y="549" text-anchor="middle" fill="#64748b" font-size="9">chunk index (documents)  ·  200w · cosine</text>
<text x="540" y="549" text-anchor="middle" fill="#64748b" font-size="9">page index (page_index)  ·  500w · O(log n)</text>
<text x="380" y="560" text-anchor="middle" fill="#475569" font-size="7">HNSW multi-layer graph · LSH pre-filter · sub-ms retrieval</text>

<!-- answer tool bypass -->
<rect x="736" y="508" width="188" height="58" rx="7" fill="#0d0415" stroke="#2d1040" stroke-width="1" stroke-dasharray="4,2"/>
<text x="830" y="532" text-anchor="middle" fill="#2d1040" font-size="9">answer tool</text>
<text x="830" y="546" text-anchor="middle" fill="#2d1040" font-size="9">bypasses ChromaDB</text>
<text x="830" y="558" text-anchor="middle" fill="#2d1040" font-size="8">→ ends loop directly</text>

<line x1="380" y1="566" x2="380" y2="592" stroke="#34d399" stroke-width="2" marker-end="url(#aG)"/>

<!-- ═══════════════════ STEP 5: OBSERVATION ═══════════════════════════════════ -->
<rect x="36" y="594" width="688" height="52" rx="7" fill="#080e1a" stroke="#334155" stroke-width="1.5"/>
<text x="380" y="614" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="700">📡 Observation  (tool result appended to context)</text>
<text x="210" y="632" text-anchor="middle" fill="#64748b" font-size="8">ranked chunks · scores · filenames · locations</text>
<text x="540" y="632" text-anchor="middle" fill="#64748b" font-size="8">sources tracked for final citation</text>

<line x1="380" y1="646" x2="380" y2="672" stroke="#fbbf24" stroke-width="2" marker-end="url(#aA)"/>

<!-- ═══════════════════ STEP 6: SELF-REFLECTION ══════════════════════════════ -->
<rect x="36" y="674" width="688" height="80" rx="7" fill="#080e1a" stroke="#78350f" stroke-width="1.5"/>
<rect x="36" y="674" width="5" height="80" rx="3" fill="url(#gAmber)"/>
<text x="380" y="694" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">🪞 Self-Reflection</text>
<text x="380" y="712" text-anchor="middle" fill="#94a3b8" font-size="10">"Do I have sufficient context to fully answer the question?"</text>
<text x="200" y="734" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">✓ YES  →  call answer()</text>
<line x1="380" y1="718" x2="380" y2="748" stroke="#334155" stroke-width="1"/>
<text x="560" y="734" text-anchor="middle" fill="#f87171" font-size="10" font-weight="700">✗ NO  →  plan next tool call</text>

<!-- Loop back arrow -->
<path d="M 894 700 C 934 700 934 380 894 380" stroke="#ec4899" stroke-width="2" stroke-dasharray="6,3" fill="none"/>
<line x1="894" y1="380" x2="840" y2="380" stroke="#ec4899" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#aPk)"/>
<text x="942" y="545" text-anchor="middle" fill="#ec4899" font-size="9" font-weight="700" transform="rotate(90 942 545)">ITERATE  (up to 5×)</text>

<line x1="200" y1="754" x2="200" y2="790" stroke="#34d399" stroke-width="2" marker-end="url(#aG)"/>

<!-- ═══════════════════ STEP 7: OUTPUT GUARDRAILS ════════════════════════════ -->
<circle cx="46" cy="810" r="16" fill="#9d174d" stroke="#f472b6" stroke-width="1.5"/>
<text x="46" y="815" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">7</text>
<text x="72" y="816" fill="#f472b6" font-size="12" font-weight="700" letter-spacing="1">OUTPUT GUARDRAILS  (same 4 guards as Standard RAG)</text>

<rect x="36" y="832" width="888" height="100" rx="7" fill="#0d0415" stroke="#f59e0b" stroke-width="1.5"/>
<rect x="36" y="832" width="888" height="22" rx="7" fill="#1c1000"/>
<text x="480" y="848" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">⚡ OUTPUT GUARDRAILS  (run on agent's final answer before returning)</text>

<rect x="46"  y="860" width="198" height="40" rx="5" fill="#0d0a00" stroke="#f59e0b" stroke-width="1"/>
<text x="145" y="877" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">⑦ ConfidenceGuard</text>
<text x="145" y="891" text-anchor="middle" fill="#64748b" font-size="7">low retrieval scores → WARN</text>

<rect x="256" y="860" width="198" height="40" rx="5" fill="#0d0a00" stroke="#f59e0b" stroke-width="1"/>
<text x="355" y="877" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">⑧ HallucinationGuard</text>
<text x="355" y="891" text-anchor="middle" fill="#64748b" font-size="7">low answer/source overlap → WARN</text>

<rect x="466" y="860" width="198" height="40" rx="5" fill="#0d0a00" stroke="#f59e0b" stroke-width="1"/>
<text x="565" y="877" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">⑨ CitationGuard</text>
<text x="565" y="891" text-anchor="middle" fill="#64748b" font-size="7">no citations in long answer → WARN</text>

<rect x="676" y="860" width="238" height="40" rx="5" fill="#0d0a00" stroke="#f59e0b" stroke-width="1"/>
<text x="795" y="877" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">⑩ PIIScrubber</text>
<text x="795" y="891" text-anchor="middle" fill="#64748b" font-size="7">PII in answer → REDACT</text>

<text x="480" y="924" text-anchor="middle" fill="#475569" font-size="8">Agentic RAG uses identical output guardrails — the pipeline shape differs but safety checks are the same</text>

<line x1="480" y1="932" x2="480" y2="958" stroke="#34d399" stroke-width="2" marker-end="url(#aG)"/>

<!-- ═══════════════════ FINAL OUTPUT ═════════════════════════════════════════ -->
<rect x="36" y="960" width="888" height="58" rx="7" fill="#04100a" stroke="#065f46" stroke-width="2"/>
<text x="480" y="983" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">✅ Answer  +  Sources  +  Trace  +  Warnings</text>
<text x="480" y="1001" text-anchor="middle" fill="#475569" font-size="9">text with citations  ·  sources · scores  ·  reasoning trace  ·  iterations  ·  guardrail_warnings  ·  cache_hit</text>

<!-- ═══════════════════ EXAMPLE TRACE ════════════════════════════════════════ -->
<rect x="36" y="1032" width="888" height="130" rx="7" fill="#040810" stroke="#1e293b" stroke-width="1"/>
<text x="56" y="1052" fill="#334155" font-size="9" font-weight="700" letter-spacing="2">EXAMPLE TRACE  —  "Compare HNSW and LSH across all documents"</text>
<line x1="46" y1="1058" x2="914" y2="1058" stroke="#0f172a" stroke-width="1"/>
<text x="56" y="1074" fill="#ec4899" font-size="8" font-weight="700">[1]</text>
<text x="74" y="1074" fill="#64748b" font-size="8">thought:</text>
<text x="120" y="1074" fill="#94a3b8" font-size="8">"I need to find HNSW information first"</text>
<text x="74" y="1086" fill="#22d3ee" font-size="8">→  search_chunks({ "query": "HNSW hierarchical navigable small world", "top_k": 4 })</text>
<text x="74" y="1098" fill="#34d399" font-size="8">←  [vector_databases.md · chunk 3/8 · score 0.93]  "HNSW builds a multi-layer graph for O(log n) search..."</text>
<text x="56" y="1114" fill="#ec4899" font-size="8" font-weight="700">[2]</text>
<text x="74" y="1114" fill="#64748b" font-size="8">thought:</text>
<text x="120" y="1114" fill="#94a3b8" font-size="8">"Now I need LSH details"</text>
<text x="74" y="1126" fill="#22d3ee" font-size="8">→  search_chunks({ "query": "LSH locality sensitive hashing buckets", "top_k": 3 })</text>
<text x="74" y="1138" fill="#34d399" font-size="8">←  [chromadb_guide.txt · chunk 2/5 · score 0.87]  "LSH hashes similar vectors to the same bucket..."</text>
<text x="56" y="1154" fill="#ec4899" font-size="8" font-weight="700">[3]</text>
<text x="74" y="1154" fill="#64748b" font-size="8">thought:</text>
<text x="120" y="1154" fill="#94a3b8" font-size="8">"I have enough for a complete answer — calling answer()"</text>

