<svg viewBox="0 0 860 1140" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#111"/>
  </marker>
  <marker id="arr-sm" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
    <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
  </marker>
</defs>

<rect width="860" height="1140" fill="#ffffff"/>
<rect x="1" y="1" width="858" height="1138" fill="none" stroke="#111" stroke-width="1.5"/>

<!-- ── TITLE ─────────────────────────────────────────────────────────────── -->
<rect x="1" y="1" width="858" height="56" fill="#111"/>
<text x="430" y="26" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" letter-spacing="3">AGENTIC RAG PIPELINE</text>
<text x="430" y="47" text-anchor="middle" fill="#aaa" font-size="9" letter-spacing="3">GUARDRAILS · TOOL USE · REACT LOOP · SELF-REFLECTION · ITERATIVE RETRIEVAL</text>

<!-- ── VS BANNER ─────────────────────────────────────────────────────────── -->
<rect x="28" y="68" width="804" height="36" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<line x1="430" y1="68" x2="430" y2="104" stroke="#ddd" stroke-width="1"/>
<text x="215" y="83" text-anchor="middle" fill="#555" font-size="9" font-weight="700">STANDARD RAG</text>
<text x="215" y="96" text-anchor="middle" fill="#555" font-size="8">fixed top-k → generate once</text>
<text x="430" y="92" text-anchor="middle" fill="#111" font-size="14" font-weight="800">VS</text>
<text x="645" y="83" text-anchor="middle" fill="#111" font-size="9" font-weight="700">AGENTIC RAG  (this diagram)</text>
<text x="645" y="96" text-anchor="middle" fill="#111" font-size="8">plan → act → reflect → loop</text>

<!-- ── STEP 1: INPUT GUARDRAILS ──────────────────────────────────────────── -->
<circle cx="38" cy="124" r="13" fill="#111"/>
<text x="38" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">1</text>
<text x="58" y="129" fill="#111" font-size="11" font-weight="700">INPUT GUARDRAILS  (identical to Standard RAG)</text>

<rect x="28" y="140" width="804" height="72" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="2"/>
<rect x="28" y="140" width="804" height="20" rx="4" fill="#111"/>
<text x="430" y="154" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">INPUT GUARDRAILS  —  6 guards, fail-fast  (QueryLength · Injection · Toxicity · PII · Topic · RateLimit)</text>
<text x="215" y="176" text-anchor="middle" fill="#111" font-size="9" font-weight="700">BLOCK  →  return error</text>
<text x="215" y="190" text-anchor="middle" fill="#555" font-size="8">never enters agent loop</text>
<line x1="430" y1="162" x2="430" y2="212" stroke="#ddd" stroke-width="1"/>
<text x="645" y="176" text-anchor="middle" fill="#111" font-size="9" font-weight="700">REDACT  →  sanitise query</text>
<text x="645" y="190" text-anchor="middle" fill="#555" font-size="8">agent receives clean input</text>
<text x="430" y="204" text-anchor="middle" fill="#555" font-size="7">Guardrails run BEFORE the agent loop — agent never sees blocked or unsanitised input</text>

<line x1="430" y1="212" x2="430" y2="234" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 2: AGENT BRAIN ────────────────────────────────────────────────── -->
<circle cx="38" cy="252" r="13" fill="#111"/>
<text x="38" y="257" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">2</text>
<text x="58" y="257" fill="#111" font-size="11" font-weight="700">AGENT  (LLM as Orchestrator  ·  agentic_rag.py)</text>

<rect x="28" y="268" width="804" height="66" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
<rect x="28" y="268" width="804" height="20" rx="4" fill="#111"/>
<text x="430" y="282" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Agent Brain  (Ollama / Gemini)</text>
<text x="280" y="306" text-anchor="middle" fill="#555" font-size="8">Receives: query + history + prior observations</text>
<text x="280" y="320" text-anchor="middle" fill="#555" font-size="8">Outputs JSON: { "thought": "...", "tool": "...", "args": {...} }</text>
<line x1="550" y1="290" x2="550" y2="334" stroke="#ddd" stroke-width="1"/>
<text x="690" y="303" text-anchor="middle" fill="#555" font-size="8">Plans: which tool? what args?</text>
<text x="690" y="316" text-anchor="middle" fill="#555" font-size="8">Reflects: enough context?</text>
<!-- max iter badge -->
<rect x="800" y="274" width="26" height="36" rx="3" fill="#111"/>
<text x="813" y="289" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">MAX</text>
<text x="813" y="303" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">5</text>

<line x1="430" y1="334" x2="430" y2="356" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 3: TOOL BELT ──────────────────────────────────────────────────── -->
<circle cx="38" cy="374" r="13" fill="#111"/>
<text x="38" y="379" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">3</text>
<text x="58" y="379" fill="#111" font-size="11" font-weight="700">TOOL BELT  (ToolExecutor dispatches to ChromaDB)</text>

<!-- 5 tool boxes -->
<rect x="28"  y="390" width="142" height="76" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="99" y="407" text-anchor="middle" fill="#111" font-size="9" font-weight="700">search_chunks</text>
<line x1="38" y1="413" x2="160" y2="413" stroke="#ddd" stroke-width="1"/>
<text x="99" y="427" text-anchor="middle" fill="#555" font-size="7">Fine-grained retrieval</text>
<text x="99" y="439" text-anchor="middle" fill="#555" font-size="7">query, top_k</text>
<text x="99" y="453" text-anchor="middle" fill="#111" font-size="7" font-weight="600">facts · defs · code</text>

<rect x="182" y="390" width="142" height="76" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="253" y="407" text-anchor="middle" fill="#111" font-size="9" font-weight="700">search_pages</text>
<line x1="192" y1="413" x2="314" y2="413" stroke="#ddd" stroke-width="1"/>
<text x="253" y="427" text-anchor="middle" fill="#555" font-size="7">Broad page retrieval</text>
<text x="253" y="439" text-anchor="middle" fill="#555" font-size="7">query, top_k</text>
<text x="253" y="453" text-anchor="middle" fill="#111" font-size="7" font-weight="600">overviews · wide topics</text>

<rect x="336" y="390" width="142" height="76" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="407" y="407" text-anchor="middle" fill="#111" font-size="9" font-weight="700">filter_by_file</text>
<line x1="346" y1="413" x2="468" y2="413" stroke="#ddd" stroke-width="1"/>
<text x="407" y="427" text-anchor="middle" fill="#555" font-size="7">Single doc search</text>
<text x="407" y="439" text-anchor="middle" fill="#555" font-size="7">filename, query, top_k</text>
<text x="407" y="453" text-anchor="middle" fill="#111" font-size="7" font-weight="600">known source</text>

<rect x="490" y="390" width="142" height="76" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="561" y="407" text-anchor="middle" fill="#111" font-size="9" font-weight="700">summarise_doc</text>
<line x1="500" y1="413" x2="622" y2="413" stroke="#ddd" stroke-width="1"/>
<text x="561" y="427" text-anchor="middle" fill="#555" font-size="7">Full doc overview</text>
<text x="561" y="439" text-anchor="middle" fill="#555" font-size="7">filename</text>
<text x="561" y="453" text-anchor="middle" fill="#111" font-size="7" font-weight="600">doc-level summary</text>

<!-- answer tool — solid border, distinct -->
<rect x="644" y="390" width="188" height="76" rx="4" fill="#111"/>
<text x="738" y="411" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">answer  (ends loop)</text>
<line x1="654" y1="416" x2="822" y2="416" stroke="#333" stroke-width="1"/>
<text x="738" y="431" text-anchor="middle" fill="#aaa" font-size="7">answer, confident</text>
<text x="738" y="444" text-anchor="middle" fill="#aaa" font-size="7">bypasses ChromaDB</text>
<text x="738" y="457" text-anchor="middle" fill="#ccc" font-size="7" font-weight="600">call when ready</text>

<!-- arrows: 4 retrieval tools → ChromaDB -->
<line x1="99"  y1="466" x2="99"  y2="500" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-sm)"/>
<line x1="253" y1="466" x2="253" y2="500" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-sm)"/>
<line x1="407" y1="466" x2="407" y2="500" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-sm)"/>
<line x1="561" y1="466" x2="561" y2="500" stroke="#555" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-sm)"/>

<!-- answer tool → skip DB -->
<line x1="738" y1="466" x2="738" y2="500" stroke="#555" stroke-width="1" stroke-dasharray="2,3"/>

<!-- ── STEP 4: CHROMADB ──────────────────────────────────────────────────── -->
<rect x="28" y="502" width="604" height="52" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="330" y="522" text-anchor="middle" fill="#111" font-size="10" font-weight="700">ToolExecutor  →  ChromaDB  (HNSW + LSH)</text>
<text x="175" y="540" text-anchor="middle" fill="#555" font-size="8">chunk index  ·  200w  ·  cosine</text>
<line x1="340" y1="508" x2="340" y2="554" stroke="#ddd" stroke-width="1"/>
<text x="490" y="540" text-anchor="middle" fill="#555" font-size="8">page index  ·  500w  ·  O(log n) HNSW</text>

<!-- answer bypass box -->
<rect x="644" y="502" width="188" height="52" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1" stroke-dasharray="4,2"/>
<text x="738" y="524" text-anchor="middle" fill="#888" font-size="8">answer tool</text>
<text x="738" y="538" text-anchor="middle" fill="#888" font-size="7">bypasses DB → ends loop</text>

<line x1="330" y1="554" x2="330" y2="576" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 5: OBSERVATION ───────────────────────────────────────────────── -->
<rect x="28" y="578" width="604" height="46" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="330" y="597" text-anchor="middle" fill="#111" font-size="10" font-weight="700">Observation  (tool result)</text>
<text x="175" y="613" text-anchor="middle" fill="#555" font-size="8">ranked chunks · scores · filenames</text>
<line x1="340" y1="583" x2="340" y2="624" stroke="#ddd" stroke-width="1"/>
<text x="490" y="613" text-anchor="middle" fill="#555" font-size="8">appended to accumulated context</text>

<line x1="330" y1="624" x2="330" y2="646" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 6: SELF-REFLECTION ────────────────────────────────────────────── -->
<rect x="28" y="648" width="604" height="76" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
<rect x="28" y="648" width="604" height="20" rx="4" fill="#111"/>
<text x="330" y="662" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Self-Reflection</text>
<text x="330" y="685" text-anchor="middle" fill="#555" font-size="10">"Do I have enough information to fully answer the question?"</text>
<line x1="330" y1="696" x2="330" y2="724" stroke="#ddd" stroke-width="1"/>
<text x="175" y="710" text-anchor="middle" fill="#111" font-size="10" font-weight="700">YES  →  call answer()</text>
<text x="490" y="710" text-anchor="middle" fill="#555" font-size="10" font-weight="700">NO  →  plan next tool</text>
<text x="175" y="722" text-anchor="middle" fill="#555" font-size="8">ends loop, produces answer</text>
<text x="490" y="722" text-anchor="middle" fill="#555" font-size="8">return to Step 2 (agent brain)</text>

<!-- LOOP BACK ARROW -->
<path d="M 832 660 C 848 660 848 370 832 370" stroke="#111" stroke-width="2" stroke-dasharray="6,3" fill="none"/>
<line x1="832" y1="370" x2="832" y2="370" stroke="#111" stroke-width="2"/>
<polygon points="822,370 832,356 842,370" fill="#111"/>
<text x="852" y="518" text-anchor="middle" fill="#111" font-size="9" font-weight="700" transform="rotate(90 852 518)">ITERATE  (max 5×)</text>

<line x1="175" y1="724" x2="175" y2="758" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 7: OUTPUT GUARDRAILS ─────────────────────────────────────────── -->
<circle cx="38" cy="776" r="13" fill="#111"/>
<text x="38" y="781" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">7</text>
<text x="58" y="781" fill="#111" font-size="11" font-weight="700">OUTPUT GUARDRAILS  (same 4 guards as Standard RAG)</text>

<rect x="28" y="792" width="804" height="122" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="2"/>
<rect x="28" y="792" width="804" height="20" rx="4" fill="#111"/>
<text x="430" y="806" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">OUTPUT GUARDRAILS  —  run on agent's final answer before returning  (4 guards)</text>

<rect x="38"  y="820" width="184" height="44" rx="3" fill="#fff" stroke="#555" stroke-width="1" stroke-dasharray="5,2"/>
<text x="130" y="836" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑦ ConfidenceGuard</text>
<text x="130" y="850" text-anchor="middle" fill="#555" font-size="7">low scores  →  WARN</text>

<rect x="232" y="820" width="184" height="44" rx="3" fill="#fff" stroke="#555" stroke-width="1" stroke-dasharray="5,2"/>
<text x="324" y="836" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑧ HallucinationGuard</text>
<text x="324" y="850" text-anchor="middle" fill="#555" font-size="7">low overlap  →  WARN</text>

<rect x="426" y="820" width="184" height="44" rx="3" fill="#fff" stroke="#555" stroke-width="1" stroke-dasharray="5,2"/>
<text x="518" y="836" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑨ CitationGuard</text>
<text x="518" y="850" text-anchor="middle" fill="#555" font-size="7">no citations  →  WARN</text>

<rect x="620" y="820" width="202" height="44" rx="3" fill="#fff" stroke="#555" stroke-width="1" stroke-dasharray="5,2"/>
<text x="721" y="836" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑩ PIIScrubber</text>
<text x="721" y="850" text-anchor="middle" fill="#555" font-size="7">PII in answer  →  REDACT</text>

<text x="430" y="882" text-anchor="middle" fill="#555" font-size="8">Agentic RAG uses identical output guardrails  ·  pipeline differs, safety checks are the same</text>
<text x="430" y="896" text-anchor="middle" fill="#333" font-size="8" font-weight="600">Output guards NEVER block — warn and optionally sanitise only</text>
<text x="430" y="908" text-anchor="middle" fill="#555" font-size="7">guardrail_warnings attached to final response payload alongside answer + sources + trace</text>

<line x1="430" y1="914" x2="430" y2="936" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── FINAL ANSWER ────────────────────────────────────────────────────────── -->
<rect x="28" y="938" width="804" height="52" rx="4" fill="#111"/>
<text x="430" y="960" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Answer  +  Sources  +  Trace  +  Warnings</text>
<text x="430" y="977" text-anchor="middle" fill="#aaa" font-size="9">text · citations · scores · reasoning trace · iterations · guardrail_warnings · cache_hit</text>

<!-- ── EXAMPLE TRACE ────────────────────────────────────────────────────────── -->
<rect x="28" y="1002" width="804" height="104" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
<text x="48" y="1020" fill="#555" font-size="8" font-weight="700" letter-spacing="2">EXAMPLE TRACE  —  "Compare HNSW and LSH across all documents"  (3 iterations)</text>
<line x1="38" y1="1026" x2="822" y2="1026" stroke="#ddd" stroke-width="1"/>
<text x="48" y="1041" fill="#111" font-size="8" font-weight="700">[1]</text>
<text x="65" y="1041" fill="#555" font-size="8">thought: "I need HNSW information first"</text>
<text x="65" y="1054" fill="#333" font-size="8">→  search_chunks({ "query": "HNSW hierarchical navigable small world", "top_k": 4 })</text>
<text x="65" y="1067" fill="#555" font-size="8">←  [vector_databases.md · chunk 3/8 · score 0.93]  "HNSW builds a multi-layer graph..."</text>
<text x="48" y="1082" fill="#111" font-size="8" font-weight="700">[2]</text>
<text x="65" y="1082" fill="#555" font-size="8">thought: "Now I need LSH details"   →  search_chunks({"query": "LSH locality sensitive hashing"})   ←  [score 0.88]</text>
<text x="48" y="1096" fill="#111" font-size="8" font-weight="700">[3]</text>
<text x="65" y="1096" fill="#555" font-size="8">thought: "Enough context — calling answer()"   →  answer({"answer": "HNSW uses multi-layer graphs...", "confident": true})</text>

<!-- ── FOOTER ──────────────────────────────────────────────────────────────── -->
<line x1="1" y1="1120" x2="859" y2="1120" stroke="#ddd" stroke-width="1"/>
<text x="430" y="1132" text-anchor="middle" fill="#aaa" font-size="8" letter-spacing="1">agentic_rag.py · guardrails.py · AgenticRAG · ToolExecutor · ReAct Framework · max_iterations=5</text>
</svg>
