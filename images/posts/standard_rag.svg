<svg viewBox="0 0 860 1100" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#111"/>
  </marker>
  <marker id="arr-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
  </marker>
</defs>

<!-- Background -->
<rect width="860" height="1100" fill="#ffffff"/>

<!-- Outer border -->
<rect x="1" y="1" width="858" height="1098" fill="none" stroke="#111" stroke-width="1.5"/>

<!-- ── TITLE ─────────────────────────────────────────────────────────────── -->
<rect x="1" y="1" width="858" height="56" fill="#111"/>
<text x="430" y="26" text-anchor="middle" fill="#fff" font-size="18" font-weight="800" letter-spacing="3">STANDARD RAG PIPELINE</text>
<text x="430" y="47" text-anchor="middle" fill="#aaa" font-size="9" letter-spacing="3">TF-IDF · CHUNKING · SENTENCE TRANSFORMERS · HNSW · LSH · CAG · CONTEXT ENG. · GUARDRAILS</text>

<!-- ── STEP 1: INPUT + INPUT GUARDRAILS ──────────────────────────────────── -->
<circle cx="38" cy="86" r="13" fill="#111"/>
<text x="38" y="91" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">1</text>
<text x="58" y="91" fill="#111" font-size="11" font-weight="700">INPUT  +  GUARDRAILS  (guardrails.py)</text>

<!-- User query -->
<rect x="28" y="102" width="176" height="44" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
<text x="116" y="120" text-anchor="middle" fill="#111" font-size="11" font-weight="700">User Query</text>
<text x="116" y="135" text-anchor="middle" fill="#555" font-size="8">Web · CLI · MCP · Claude Desktop</text>

<!-- arrow to guard panel -->
<line x1="204" y1="124" x2="228" y2="124" stroke="#111" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- INPUT GUARDRAILS panel -->
<rect x="230" y="102" width="602" height="196" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="2"/>
<rect x="230" y="102" width="602" height="22" rx="4" fill="#111"/>
<text x="531" y="117" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">INPUT GUARDRAILS  —  run before retrieval  (6 guards, fail-fast order)</text>

<!-- 6 guard boxes -->
<rect x="240" y="130" width="182" height="36" rx="3" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="331" y="145" text-anchor="middle" fill="#111" font-size="9" font-weight="700">① QueryLengthGuard</text>
<text x="331" y="158" text-anchor="middle" fill="#555" font-size="8">3–2000 chars  ·  BLOCK</text>

<rect x="432" y="130" width="182" height="36" rx="3" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="523" y="145" text-anchor="middle" fill="#111" font-size="9" font-weight="700">② InjectionGuard</text>
<text x="523" y="158" text-anchor="middle" fill="#555" font-size="8">jailbreak / injection  ·  BLOCK</text>

<rect x="624" y="130" width="198" height="36" rx="3" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="723" y="145" text-anchor="middle" fill="#111" font-size="9" font-weight="700">③ ToxicityGuard</text>
<text x="723" y="158" text-anchor="middle" fill="#555" font-size="8">harm / CSAM  ·  BLOCK</text>

<rect x="240" y="172" width="182" height="36" rx="3" fill="#f0f0f0" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="331" y="187" text-anchor="middle" fill="#111" font-size="9" font-weight="700">④ PIIDetector</text>
<text x="331" y="200" text-anchor="middle" fill="#555" font-size="8">email/phone/SSN  ·  REDACT</text>

<rect x="432" y="172" width="182" height="36" rx="3" fill="#f0f0f0" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="523" y="187" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑤ TopicBoundaryGuard</text>
<text x="523" y="200" text-anchor="middle" fill="#555" font-size="8">off-topic  ·  WARN / BLOCK</text>

<rect x="624" y="172" width="198" height="36" rx="3" fill="#f0f0f0" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="723" y="187" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑥ RateLimitGuard</text>
<text x="723" y="200" text-anchor="middle" fill="#555" font-size="8">20 req/60s · Redis  ·  BLOCK</text>

<!-- outcome note -->
<text x="531" y="225" text-anchor="middle" fill="#555" font-size="8">Solid border = BLOCK · Dashed border = REDACT / WARN · PASS → proceed with sanitised query</text>
<text x="531" y="238" text-anchor="middle" fill="#333" font-size="8" font-weight="600">Order: length → injection → toxic → PII → topic → rate  (cheapest checks first)</text>
<text x="531" y="251" text-anchor="middle" fill="#555" font-size="8">BLOCK returns error instantly, never touches vector DB or LLM</text>
<text x="531" y="264" text-anchor="middle" fill="#555" font-size="8">REDACT sanitises query in-place  ·  WARN attaches message to final response</text>
<text x="531" y="278" text-anchor="middle" fill="#555" font-size="8">PASS proceeds to Step 2</text>

<!-- down arrow -->
<line x1="430" y1="298" x2="430" y2="320" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 2: INGESTION ──────────────────────────────────────────────────── -->
<circle cx="38" cy="338" r="13" fill="#111"/>
<text x="38" y="343" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">2</text>
<text x="58" y="343" fill="#111" font-size="11" font-weight="700">INGESTION  (create_vector_db.py)</text>

<!-- 4 ingestion boxes -->
<rect x="28" y="354" width="188" height="64" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="122" y="372" text-anchor="middle" fill="#111" font-size="10" font-weight="700">Documents</text>
<line x1="38" y1="378" x2="206" y2="378" stroke="#ddd" stroke-width="1"/>
<text x="122" y="393" text-anchor="middle" fill="#555" font-size="8">.txt  .md  .pdf  .json  .csv</text>
<text x="122" y="407" text-anchor="middle" fill="#555" font-size="8">drop into  /data/  folder</text>

<rect x="228" y="354" width="188" height="64" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="322" y="372" text-anchor="middle" fill="#111" font-size="10" font-weight="700">Agentic Chunking</text>
<line x1="238" y1="378" x2="406" y2="378" stroke="#ddd" stroke-width="1"/>
<text x="322" y="393" text-anchor="middle" fill="#555" font-size="8">TF-IDF boundary detection</text>
<text x="322" y="407" text-anchor="middle" fill="#555" font-size="8">200w chunks  ·  40w overlap</text>

<rect x="428" y="354" width="188" height="64" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="522" y="372" text-anchor="middle" fill="#111" font-size="10" font-weight="700">TF-IDF Vectoriser</text>
<line x1="438" y1="378" x2="606" y2="378" stroke="#ddd" stroke-width="1"/>
<text x="522" y="393" text-anchor="middle" fill="#555" font-size="8">offline fallback embedder</text>
<text x="522" y="407" text-anchor="middle" fill="#555" font-size="8">context compression scoring</text>

<rect x="628" y="354" width="204" height="64" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="730" y="372" text-anchor="middle" fill="#111" font-size="10" font-weight="700">Sentence Transformer</text>
<line x1="638" y1="378" x2="822" y2="378" stroke="#ddd" stroke-width="1"/>
<text x="730" y="391" text-anchor="middle" fill="#111" font-size="8" font-weight="600">BAAI/bge-small-en-v1.5</text>
<text x="730" y="405" text-anchor="middle" fill="#555" font-size="8">dim=384  ·  normalize=True</text>

<!-- down arrow -->
<line x1="430" y1="418" x2="430" y2="440" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 3: VECTOR STORE ──────────────────────────────────────────────── -->
<circle cx="38" cy="458" r="13" fill="#111"/>
<text x="38" y="463" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">3</text>
<text x="58" y="463" fill="#111" font-size="11" font-weight="700">VECTOR STORE  (ChromaDB · HNSW · LSH)</text>

<rect x="28" y="474" width="258" height="110" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="157" y="492" text-anchor="middle" fill="#111" font-size="10" font-weight="700">ChromaDB Collections</text>
<line x1="38" y1="498" x2="276" y2="498" stroke="#ddd" stroke-width="1"/>
<text x="157" y="513" text-anchor="middle" fill="#111" font-size="9" font-weight="600">documents  (chunk index)</text>
<text x="157" y="527" text-anchor="middle" fill="#555" font-size="8">200w chunks · cosine · persistent</text>
<text x="157" y="542" text-anchor="middle" fill="#111" font-size="9" font-weight="600">page_index  (page index)</text>
<text x="157" y="556" text-anchor="middle" fill="#555" font-size="8">500w pages · cosine · persistent</text>
<text x="157" y="575" text-anchor="middle" fill="#555" font-size="8">./chroma_db/chroma.sqlite3</text>

<rect x="298" y="474" width="258" height="110" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="427" y="492" text-anchor="middle" fill="#111" font-size="10" font-weight="700">HNSW  (Hierarchical NSWorld)</text>
<line x1="308" y1="498" x2="546" y2="498" stroke="#ddd" stroke-width="1"/>
<text x="427" y="513" text-anchor="middle" fill="#555" font-size="8">Layer 2:   A ─────────── G</text>
<text x="427" y="527" text-anchor="middle" fill="#555" font-size="8">Layer 1:   A ── C ── E ── G</text>
<text x="427" y="541" text-anchor="middle" fill="#555" font-size="8">Layer 0:   A─B─C─D─E─F─G</text>
<text x="427" y="557" text-anchor="middle" fill="#111" font-size="9" font-weight="600">O(log n) ANN  ·  sub-ms queries</text>
<text x="427" y="572" text-anchor="middle" fill="#555" font-size="8">greedy descent from top layer</text>

<rect x="568" y="474" width="264" height="110" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="700" y="492" text-anchor="middle" fill="#111" font-size="10" font-weight="700">LSH  (Locality Sensitive Hashing)</text>
<line x1="578" y1="498" x2="822" y2="498" stroke="#ddd" stroke-width="1"/>
<text x="700" y="513" text-anchor="middle" fill="#555" font-size="8">similar vectors → same bucket</text>
<text x="700" y="527" text-anchor="middle" fill="#555" font-size="8">multiple hash tables → candidates</text>
<text x="700" y="541" text-anchor="middle" fill="#111" font-size="9" font-weight="600">fast candidate pre-selection</text>
<text x="700" y="557" text-anchor="middle" fill="#555" font-size="8">HNSW refines LSH candidates</text>
<text x="700" y="572" text-anchor="middle" fill="#555" font-size="8">hnsw:space = cosine</text>

<!-- down arrow -->
<line x1="430" y1="584" x2="430" y2="606" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 4: CAG + CONTEXT ENGINE + LLM ───────────────────────────────── -->
<circle cx="38" cy="624" r="13" fill="#111"/>
<text x="38" y="629" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">4</text>
<text x="58" y="629" fill="#111" font-size="11" font-weight="700">CAG  +  CONTEXT ENGINEERING  +  LLM  (rag.py · context_engine.py)</text>

<!-- Redis -->
<rect x="28" y="640" width="186" height="148" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
<rect x="28" y="640" width="186" height="22" rx="4" fill="#111"/>
<text x="121" y="655" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Redis  (CAG)</text>
<text x="121" y="678" text-anchor="middle" fill="#555" font-size="8">Cache-Augmented Generation</text>
<text x="121" y="693" text-anchor="middle" fill="#111" font-size="9" font-weight="700">HIT  →  return ~2ms</text>
<text x="121" y="708" text-anchor="middle" fill="#555" font-size="8">MISS → continue pipeline</text>
<text x="121" y="722" text-anchor="middle" fill="#555" font-size="8">SHA256(query+top_k) key</text>
<text x="121" y="736" text-anchor="middle" fill="#555" font-size="8">TTL 3600s  ·  40%+ hit rate</text>
<text x="121" y="751" text-anchor="middle" fill="#555" font-size="8">JSON: answer+sources+scores</text>
<text x="121" y="765" text-anchor="middle" fill="#555" font-size="8">guardrail_warnings cached</text>
<text x="121" y="779" text-anchor="middle" fill="#555" font-size="8">cache write after generation</text>

<!-- Context Engine -->
<rect x="226" y="640" width="290" height="148" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="2"/>
<rect x="226" y="640" width="290" height="22" rx="4" fill="#111"/>
<text x="371" y="655" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Context Engine  (context_engine.py)</text>
<text x="237" y="676" fill="#111" font-size="9" font-weight="700">①</text><text x="251" y="676" fill="#111" font-size="9">QueryRewriter</text><text x="380" y="676" fill="#555" font-size="9">pronouns via history</text>
<text x="237" y="692" fill="#111" font-size="9" font-weight="700">②</text><text x="251" y="692" fill="#111" font-size="9">Two-Stage Retrieval</text><text x="388" y="692" fill="#555" font-size="9">page + chunk</text>
<text x="237" y="708" fill="#111" font-size="9" font-weight="700">③</text><text x="251" y="708" fill="#111" font-size="9">MMR Re-rank</text><text x="370" y="708" fill="#555" font-size="9">λ=0.7 diversity</text>
<text x="237" y="724" fill="#111" font-size="9" font-weight="700">④</text><text x="251" y="724" fill="#111" font-size="9">ContextCompressor</text><text x="388" y="724" fill="#555" font-size="9">TF-IDF drop</text>
<text x="237" y="740" fill="#111" font-size="9" font-weight="700">⑤</text><text x="251" y="740" fill="#111" font-size="9">TokenBudgetManager</text><text x="392" y="740" fill="#555" font-size="9">3000 tokens</text>
<text x="237" y="756" fill="#111" font-size="9" font-weight="700">⑥</text><text x="251" y="756" fill="#111" font-size="9">SystemPromptBuilder</text><text x="390" y="756" fill="#555" font-size="9">structured prompt</text>
<text x="237" y="772" fill="#111" font-size="9" font-weight="700">⑦</text><text x="251" y="772" fill="#111" font-size="9">ConversationMemory</text><text x="390" y="772" fill="#555" font-size="9">6-turn window</text>

<!-- LLM -->
<rect x="528" y="640" width="304" height="148" rx="4" fill="#fff" stroke="#111" stroke-width="2"/>
<rect x="528" y="640" width="304" height="22" rx="4" fill="#111"/>
<text x="680" y="655" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">LLM Generation</text>
<rect x="538" y="668" width="132" height="62" rx="3" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="604" y="686" text-anchor="middle" fill="#111" font-size="10" font-weight="700">Gemini</text>
<text x="604" y="701" text-anchor="middle" fill="#555" font-size="8">gemini-2.0-flash-lite</text>
<text x="604" y="714" text-anchor="middle" fill="#555" font-size="8">cloud · retry on 429</text>
<rect x="690" y="668" width="132" height="62" rx="3" fill="#f5f5f5" stroke="#111" stroke-width="1.5"/>
<text x="756" y="686" text-anchor="middle" fill="#111" font-size="10" font-weight="700">Ollama</text>
<text x="756" y="701" text-anchor="middle" fill="#555" font-size="8">llama3.2 / mistral</text>
<text x="756" y="714" text-anchor="middle" fill="#555" font-size="8">local · no quota</text>
<text x="680" y="748" text-anchor="middle" fill="#555" font-size="8">answer · sources · scores</text>
<text x="680" y="762" text-anchor="middle" fill="#555" font-size="8">cache_hit · context_steps</text>
<text x="680" y="776" text-anchor="middle" fill="#555" font-size="8">guardrail_warnings</text>

<!-- down arrow -->
<line x1="430" y1="788" x2="430" y2="810" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

<!-- ── STEP 5: OUTPUT GUARDRAILS ─────────────────────────────────────────── -->
<circle cx="38" cy="828" r="13" fill="#111"/>
<text x="38" y="833" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">5</text>
<text x="58" y="833" fill="#111" font-size="11" font-weight="700">OUTPUT GUARDRAILS  (guardrails.py)</text>

<rect x="28" y="844" width="804" height="156" rx="4" fill="#f5f5f5" stroke="#111" stroke-width="2"/>
<rect x="28" y="844" width="804" height="22" rx="4" fill="#111"/>
<text x="430" y="859" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">OUTPUT GUARDRAILS  —  run after generation, before returning to user  (4 guards)</text>

<rect x="38" y="872" width="186" height="50" rx="3" fill="#fff" stroke="#555" stroke-width="1.5" stroke-dasharray="5,2"/>
<text x="131" y="889" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑦ ConfidenceGuard</text>
<text x="131" y="903" text-anchor="middle" fill="#555" font-size="8">top score &lt; 0.3  →  WARN</text>
<text x="131" y="914" text-anchor="middle" fill="#555" font-size="7">"answer may not be accurate"</text>

<rect x="234" y="872" width="186" height="50" rx="3" fill="#fff" stroke="#555" stroke-width="1.5" stroke-dasharray="5,2"/>
<text x="327" y="889" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑧ HallucinationGuard</text>
<text x="327" y="903" text-anchor="middle" fill="#555" font-size="8">overlap &lt; 15%  →  WARN</text>
<text x="327" y="914" text-anchor="middle" fill="#555" font-size="7">"possible hallucination"</text>

<rect x="430" y="872" width="186" height="50" rx="3" fill="#fff" stroke="#555" stroke-width="1.5" stroke-dasharray="5,2"/>
<text x="523" y="889" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑨ CitationGuard</text>
<text x="523" y="903" text-anchor="middle" fill="#555" font-size="8">no source ref  →  WARN</text>
<text x="523" y="914" text-anchor="middle" fill="#555" font-size="7">"add source references"</text>

<rect x="626" y="872" width="196" height="50" rx="3" fill="#fff" stroke="#555" stroke-width="1.5" stroke-dasharray="5,2"/>
<text x="724" y="889" text-anchor="middle" fill="#111" font-size="9" font-weight="700">⑩ PIIScrubber</text>
<text x="724" y="903" text-anchor="middle" fill="#555" font-size="8">PII in answer  →  REDACT</text>
<text x="724" y="914" text-anchor="middle" fill="#555" font-size="7">email/phone → [REDACTED]</text>

<text x="430" y="942" text-anchor="middle" fill="#555" font-size="8">All 4 output guards run on every response  ·  Output guards NEVER block — they only warn or redact</text>
<text x="430" y="956" text-anchor="middle" fill="#333" font-size="8" font-weight="600">Chain: ConfidenceGuard → HallucinationGuard → CitationGuard → PIIScrubber</text>
<text x="430" y="970" text-anchor="middle" fill="#555" font-size="8">Warnings shown in Web Chat UI  ·  Redacted answer replaces original before returning to user</text>
<text x="430" y="984" text-anchor="middle" fill="#555" font-size="7">guardrail_warnings list appended to response payload alongside answer + sources</text>

<!-- down arrow -->
<line x1="430" y1="1000" x2="430" y2="1022" stroke="#111" stroke-width="2" marker-end="url(#arr)"/>

